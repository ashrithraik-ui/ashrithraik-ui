<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0d1a1a"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Corner clip -->
    <clipPath id="cardClip">
      <path d="M20,0 L680,0 L700,20 L700,300 L680,320 L20,320 L0,300 L0,20 Z"/>
    </clipPath>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="700" height="4" patternUnits="userSpaceOnUse">
      <rect width="700" height="1" y="0" fill="rgba(0,255,247,0.03)"/>
    </pattern>
  </defs>

  <!-- Card body -->
  <path d="M20,0 L680,0 L700,20 L700,300 L680,320 L20,320 L0,300 L0,20 Z"
        fill="url(#bg)" stroke="#00fff7" stroke-width="1.2" opacity="0.95"/>

  <!-- Scanlines overlay -->
  <rect width="700" height="320" fill="url(#scanlines)" clip-path="url(#cardClip)"/>

  <!-- Outer glow border effect -->
  <path d="M20,0 L680,0 L700,20 L700,300 L680,320 L20,320 L0,300 L0,20 Z"
        fill="none" stroke="#00fff7" stroke-width="3" opacity="0.15" filter="url(#strongGlow)"/>

  <!-- Top accent line -->
  <line x1="0" y1="48" x2="700" y2="48" stroke="#00fff7" stroke-width="0.5" opacity="0.4"/>

  <!-- Bottom accent line -->
  <line x1="0" y1="272" x2="700" y2="272" stroke="#00fff7" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner markers -->
  <rect x="6" y="6" width="14" height="2" fill="#00fff7" filter="url(#cyanGlow)"/>
  <rect x="6" y="6" width="2" height="14" fill="#00fff7" filter="url(#cyanGlow)"/>
  <rect x="680" y="6" width="14" height="2" fill="#00fff7" filter="url(#cyanGlow)"/>
  <rect x="692" y="6" width="2" height="14" fill="#00fff7" filter="url(#cyanGlow)"/>
  <rect x="6" y="302" width="14" height="2" fill="#00fff7" filter="url(#cyanGlow)"/>
  <rect x="6" y="300" width="2" height="14" fill="#00fff7" filter="url(#cyanGlow)"/>
  <rect x="680" y="302" width="14" height="2" fill="#00fff7" filter="url(#cyanGlow)"/>
  <rect x="692" y="300" width="2" height="14" fill="#00fff7" filter="url(#cyanGlow)"/>

  <!-- Header: title -->
  <text x="350" y="30" font-family="'Courier New', monospace" font-size="11"
        fill="#00fff7" text-anchor="middle" letter-spacing="5" filter="url(#textGlow)">
    SYSTEM IDENTITY CARD // v1.0
  </text>

  <!-- Blinking status dot (simulated) -->
  <circle cx="670" cy="27" r="5" fill="#00fff7" filter="url(#strongGlow)" opacity="0.9"/>
  <circle cx="655" cy="27" r="3" fill="#00fff7" opacity="0.4"/>

  <!-- Left label column -->
  <text x="30" y="80"  font-family="'Courier New', monospace" font-size="11" fill="#00fff7" opacity="0.6" letter-spacing="2">NAME</text>
  <text x="30" y="114" font-family="'Courier New', monospace" font-size="11" fill="#00fff7" opacity="0.6" letter-spacing="2">ROLE</text>
  <text x="30" y="148" font-family="'Courier New', monospace" font-size="11" fill="#00fff7" opacity="0.6" letter-spacing="2">STATUS</text>
  <text x="30" y="182" font-family="'Courier New', monospace" font-size="11" fill="#00fff7" opacity="0.6" letter-spacing="2">STACK</text>
  <text x="30" y="216" font-family="'Courier New', monospace" font-size="11" fill="#00fff7" opacity="0.6" letter-spacing="2">FOCUS</text>
  <text x="30" y="250" font-family="'Courier New', monospace" font-size="11" fill="#00fff7" opacity="0.6" letter-spacing="2">BASE</text>

  <!-- Vertical divider -->
  <line x1="170" y1="56" x2="170" y2="265" stroke="#00fff7" stroke-width="0.6" opacity="0.3"/>

  <!-- Right value column -->
  <text x="190" y="80"  font-family="'Courier New', monospace" font-size="13" fill="#ffffff" font-weight="bold" filter="url(#textGlow)">Ashrith Raik</text>
  <text x="190" y="114" font-family="'Courier New', monospace" font-size="12" fill="#ccfffd">AI/ML Engineer · CSE Student · Builder</text>
  
  <!-- Status bar -->
  <rect x="190" y="135" width="120" height="8" rx="2" fill="#00fff7" opacity="0.15"/>
  <rect x="190" y="135" width="96"  height="8" rx="2" fill="#00fff7" opacity="0.7" filter="url(#cyanGlow)"/>
  <text x="320" y="144" font-family="'Courier New', monospace" font-size="11" fill="#00fff7" filter="url(#textGlow)">● ONLINE</text>

  <text x="190" y="182" font-family="'Courier New', monospace" font-size="11" fill="#ccfffd">Python · React · TensorFlow · Node.js · Git</text>
  <text x="190" y="216" font-family="'Courier New', monospace" font-size="11" fill="#ccfffd">Machine Learning · Deep Learning · Web Dev</text>
  <text x="190" y="250" font-family="'Courier New', monospace" font-size="11" fill="#ccfffd">JSS STU, Mysuru · Karnataka, India</text>

  <!-- Tech tags -->
  <g transform="translate(30, 285)">
    <!-- Tag: Python -->
    <rect x="0"   y="0" width="72"  height="20" rx="3" fill="none" stroke="#00fff7" stroke-width="1" opacity="0.7"/>
    <text x="36"  y="14" font-family="'Courier New', monospace" font-size="10" fill="#00fff7" text-anchor="middle">Python</text>

    <!-- Tag: TensorFlow -->
    <rect x="80"  y="0" width="90"  height="20" rx="3" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.7"/>
    <text x="125" y="14" font-family="'Courier New', monospace" font-size="10" fill="#FF6B35" text-anchor="middle">TensorFlow</text>

    <!-- Tag: React -->
    <rect x="178" y="0" width="60"  height="20" rx="3" fill="none" stroke="#00fff7" stroke-width="1" opacity="0.7"/>
    <text x="208" y="14" font-family="'Courier New', monospace" font-size="10" fill="#00fff7" text-anchor="middle">React</text>

    <!-- Tag: LangChain -->
    <rect x="246" y="0" width="84"  height="20" rx="3" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
    <text x="288" y="14" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa" text-anchor="middle">LangChain</text>

    <!-- Tag: scikit-learn -->
    <rect x="338" y="0" width="88"  height="20" rx="3" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.7"/>
    <text x="382" y="14" font-family="'Courier New', monospace" font-size="10" fill="#FF6B35" text-anchor="middle">scikit-learn</text>
  </g>

  <!-- Footer -->
  <text x="350" y="295" font-family="'Courier New', monospace" font-size="9"
        fill="#00fff7" text-anchor="middle" opacity="0.5" letter-spacing="4">
    SYSTEM ACTIVE · UPTIME ∞
  </text>
</svg>
